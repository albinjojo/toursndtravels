name: alphonsatravels
description: "Alphonsa School Van Management"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

  # Local Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^7.0.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  pdf: ^3.10.8
  printing: ^5.12.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

  adaptive_icon_background: "#2E74C9"
  adaptive_icon_foreground: "assets/icons/app_icon.png"